[paths]
data_raw_dir = "data/raw"
data_processed_dir = "data/processed"

[corpus]
books = [
  "Genesis","Exodus","Leviticus","Numbers","Deuteronomy",
  "Joshua","Judges","I Samuel","II Samuel","I Kings","II Kings",
  "Isaiah","Jeremiah","Ezekiel",
  "Hosea","Joel","Amos","Obadiah","Jonah","Micah",
  "Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi",
  "Psalms","Proverbs","Job","Song of Songs","Ruth",
  "Lamentations","Ecclesiastes","Esther",
  "Daniel","Ezra","Nehemiah","I Chronicles","II Chronicles",
]

[cleaning]
collapse_finals = true   # WRR-94 ELS convention
stream = "ketiv"
keep_finals_in_gematria = false

[invariants]
# Layer 1: regression gate. Baseline empirical MAM/ketiv, commit 1160393.
# Tolerance 0.05% per book; min_absolute_delta 3 for books < 1000 words.
masoretic_tolerance = 0.0005

# Layer 2: acceptance cross-check vs Breuer, Keter Yerushalayim (2001).
# ISBN 965-7209-01-5. Tolerance 0.5% (MAM vs Aleppo editorial variance).
# Populate from Breuer apparatus before Sprint 5 gate.
breuer_tolerance = 0.005

